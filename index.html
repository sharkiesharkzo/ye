<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>RPG Game</title>\n    <style>\n        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }\n        canvas { border: 1px solid #fff; }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="800" height="600"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        const tileSize = 40;\n        const map = [\n            '##########',\n            '#........#',\n            '#.######.#',\n            '#........#',\n            '##########'\n        ];\n        function drawMap() {\n            for (let row = 0; row < map.length; row++) {\n                for (let col = 0; col < map[row].length; col++) {\n                    const tile = map[row][col];\n                    ctx.fillStyle = tile === '#' ? '#999' : '#1a1a1a';\n                    ctx.fillRect(col * tileSize, row * tileSize, tileSize, tileSize);\n                }\n            }\n        }\n        let player = { x: 1, y: 1 };\n        function drawPlayer() {\n            ctx.fillStyle = '#f00';\n            ctx.fillRect(player.x * tileSize, player.y * tileSize, tileSize, tileSize);\n        }\n        function update() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawMap();\n            drawPlayer();\n        }\n        function handleKeyPress(event) {\n            switch (event.key) {\n                case 'ArrowUp': player.y = Math.max(0, player.y - 1); break;\n                case 'ArrowDown': player.y = Math.min(map.length - 1, player.y + 1); break;\n                case 'ArrowLeft': player.x = Math.max(0, player.x - 1); break;\n                case 'ArrowRight': player.x = Math.min(map[0].length - 1, player.x + 1); break;\n            }\n            update();\n        }\n        window.addEventListener('keydown', handleKeyPress);\n        update();\n    <\/script>\n</body>\n</html>
